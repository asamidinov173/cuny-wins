<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Achievement — CUNY Wins</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="submit.css">
</head>
<body>

  <!-- Page Header -->
  <div class="page-header text-center">
    <!-- Award icon -->
    <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="#5b5bd6" viewBox="0 0 16 16" class="mb-2">
      <path d="M9.669.864 8 0 6.331.864l-1.858.282-.842 1.68-1.337 1.32L2.6 6l-.306 1.854 1.337 1.32.842 1.68 1.858.282L8 12l1.669-.864 1.858-.282.842-1.68 1.337-1.32L13.4 6l.306-1.854-1.337-1.32-.842-1.68zm1.196 1.193.684 1.365 1.086 1.072L12.387 6l.248 1.506-1.086 1.072-.684 1.365-1.51.229L8 10.874l-1.355-.702-1.51-.229-.684-1.365-1.086-1.072L3.614 6l-.25-1.506 1.087-1.072.684-1.365 1.51-.229L8 1.126l1.356.702z"/>
      <path d="M4 11.794V16l4-1 4 1v-4.206l-2.018.306L8 13.126 6.018 12.1z"/>
    </svg>
    <h1 class="page-title">CUNY Wins</h1>
    <p class="page-subtitle">Borough of Manhattan Community College</p>
  </div>

  <!-- Form Card -->
  <div class="form-wrapper">
    <div class="form-card">

      <h2 class="form-heading">Submit Your Achievement</h2>
      <p class="form-subheading">Celebrate your internship, job offer, or career accomplishment with the BMCC community</p>

      <form id="achievementForm">

        <!-- Photo Upload -->
        <div class="mb-4">
          <label class="form-label-custom">Photo <span class="required">*</span></label>
          <div class="upload-box" id="uploadBox">
            <input type="file" id="photoInput" accept=".png,.jpg,.jpeg" hidden>
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#aaa" viewBox="0 0 16 16" class="mb-2">
              <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
              <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708z"/>
            </svg>
            <p class="upload-text"><span class="upload-link">Click to upload</span> or drag and drop</p>
            <p class="upload-hint">PNG, JPG (MAX. 5MB)</p>
          </div>
        </div>

        <!-- Your Name -->
        <div class="mb-4">
          <label class="form-label-custom">Your Name <span class="required">*</span></label>
          <input type="text" class="form-input" placeholder="" required>
        </div>

        <!-- Email -->
        <div class="mb-4">
            <label class="form-label-custom">Email <span class="required">*</span></label>
            <input type="email" class="form-input" placeholder="" required>
        </div>

        <!-- EMPLID -->
        <div class="mb-4">
            <label class="form-label-custom">Student ID (EMPLID) <span class="required">*</span></label>
            <input type="text" class="form-input" placeholder="" required>
        </div>

        <!-- Company -->
        <div class="mb-4">
          <label class="form-label-custom">Company <span class="required">*</span></label>
          <input type="text" class="form-input" placeholder="" required>
        </div>

        <!-- Position -->
        <div class="mb-4">
          <label class="form-label-custom">Position <span class="required">*</span></label>
          <input type="text" class="form-input" placeholder="" required>
        </div>

        <!-- Start Date -->
        <div class="mb-4">
          <label class="form-label-custom">Start Date <span class="required">*</span></label>
          <input type="date" class="form-input" required>
        </div>

        <!-- LinkedIn Profile URL -->
        <div class="mb-4">
          <label class="form-label-custom">LinkedIn Profile URL <span class="required">*</span></label>
          <input type="url" class="form-input" placeholder="" required>
        </div>

        <!-- Type of Achievement -->
        <div class="mb-4">
          <label class="form-label-custom">Type of Achievement <span class="required">*</span></label>
          <div class="mt-2">
            <div class="radio-option">
              <input type="radio" name="achievement" id="internship" value="Internship" checked>
              <label for="internship">Internship</label>
            </div>
            <div class="radio-option mt-2">
                <input type="radio" name="achievement" id="parttimejob" value="Part-Time Job">
                <label for="fulltimejob">Part-Time Job</label>
            </div>
            <div class="radio-option mt-2">
              <input type="radio" name="achievement" id="fulltimejob" value="Full-Time Job">
              <label for="fulltimejob">Full-Time Job</label>
            </div>
          </div>
        </div>

        <!-- Graduation Year -->
        <div class="mb-4">
          <label class="form-label-custom">Graduation Year <span class="required">*</span></label>
          <input type="number" class="form-input" placeholder="2023" min="2020" max="2030" required>
        </div>

        <!-- Buttons -->
        <div class="d-flex gap-3 mt-4">
          <button type="submit" class="btn-submit">Submit Achievement</button>
          <button type="button" class="btn-cancel" onclick="window.location.href='index.html'">Cancel</button>
        </div>

      </form>
    </div>
  </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="index.html" class="bottom-link">View Public Portal</a>
        <span class="bottom-divider">|</span>
        <a href="dashboard.html" class="bottom-link">Faculty Dashboard</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="submit.js"></script>

</body>
</html>
